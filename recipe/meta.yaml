{% set name = "lumen" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}-bundle
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: bfcd83ecf4b78887b027598a86ddd864e81df8da703f0ad2e8b8fabed15c82a3

build:
  number: 0

outputs:
  - name: {{ name|lower }}
    build:
      entry_points:
        - lumen = lumen.command:main
      skip: true  # [py<311]
      script: python -m pip install . --no-deps --no-build-isolation --ignore-installed --no-cache-dir -vv

    requirements:
      host:
        - python
        - pip
        - hatchling
        - hatch-vcs
      run:
        - bokeh
        - numpy
        - sqlglot
        - chardet
        - python
        - panel >=1.8.7
        - hvplot
        - holoviews >=1.17.0
        - pandas
        - packaging
        - intake <2
        - jinja2 >3.0
        - pyyaml
        - param >=2.2.1
        - duckdb >=1.2.0
        - griffe
        - instructor >=1.6.4
        - markitdown
        - nbformat
        - panel-graphic-walker >=0.6.4
        - panel-material-ui >=0.8.1
        - panel-splitjs
        - pyarrow
        - pydantic >=2.8.0
        - pydantic-extra-types
        - semchunk
        # - sqlglotrs
        - tabulate
        - tiktoken
    test:
      source_files:
        - lumen/tests
      imports:
        - lumen
        - lumen.auth
        - lumen.command
        - lumen.tests
        - lumen.util
        - lumen.validation
        - lumen.views
      requires:
        - pip
      commands:
        - pip check
        - lumen --help
        # - pytest lumen/tests -v
        # Upstream tests (pytest lumen/tests -v) are disabled due to dependency version
        # conflicts with pandas 2.3+/pyarrow StringDtype changes, dask 2024+ legacy API
        # removal, and bokeh version incompatibilities between panel and dask requirements
    about:
      home: https://github.com/holoviz/lumen
      summary: 'Illuminate your data. A monitoring solution built on Panel'
      description: |
        The Lumen project provides a framework for visual analytics, which allows users to
        build data-driven dashboards from a simple yaml specification. The power of
        Lumen comes from the ability to leverage the powerful data intake, data processing
        and data visualization libraries available in the PyData ecosystem.
      license: BSD-3-Clause
      license_file: LICENSE
      license_family: BSD
      doc_url: https://lumen.holoviz.org/
      dev_url: https://github.com/holoviz/lumen
# This recipe builds multiple outputs:
# - lumen: The main package with core functionality
# - lumen-ai-local: Metapackage that adds huggingface_hub for local AI models
# - lumen-ai-openai: Metapackage that adds OpenAI support
# - lumen-ai-mistralai: Metapackage that adds MistralAI support
# - lumen-ai-anthropic: Metapackage that adds Anthropic support

  - name: {{ name|lower }}-ai-local
    build:
      skip: true  # [py<311]
    requirements:
      host:
        - python
      run:
        - python
        - {{ pin_subpackage('lumen', exact=True) }}
        - huggingface_hub
    about:
      home: https://github.com/holoviz/lumen
      summary: 'Lumen with huggingface_hub for local AI models'
      license: BSD-3-Clause
      license_family: BSD

  - name: {{ name|lower }}-ai-openai
    build:
      skip: true  # [py<311]
    requirements:
      host:
        - python
      run:
        - python
        - {{ pin_subpackage('lumen', exact=True) }}
        - openai
    about:
      home: https://github.com/holoviz/lumen
      summary: 'Lumen with OpenAI support'
      license: BSD-3-Clause
      license_family: BSD

  - name: {{ name|lower }}-ai-mistralai
    build:
      skip: true  # [py<311]
    requirements:
      host:
        - python
      run:
        - python
        - {{ pin_subpackage('lumen', exact=True) }}
        - mistralai
    about:
      home: https://github.com/holoviz/lumen
      summary: 'Lumen with MistralAI support'
      license: BSD-3-Clause
      license_family: BSD

  - name: {{ name|lower }}-ai-anthropic
    build:
      skip: true  # [py<311]
    requirements:
      host:
        - python
      run:
        - python
        - {{ pin_subpackage('lumen-ai', exact=True) }}
        - anthropic
    about:
      home: https://github.com/holoviz/lumen
      summary: 'Lumen with Anthropic support'
      license: BSD-3-Clause
      license_family: BSD

about:
  home: https://github.com/holoviz/lumen
  summary: 'Illuminate your data. A monitoring solution built on Panel'
  description: |
    Metapackage for lumen and its variants.
  license: BSD-3-Clause
  license_file: LICENSE
  license_family: BSD
  doc_url: https://lumen.holoviz.org/
  dev_url: https://github.com/holoviz/lumen

extra:
  recipe-maintainers:
    - Hoxbro
    - philippjfr
